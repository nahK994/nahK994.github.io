<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="programmer.png" type="image/png">
    <title>Shomi Khan</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f4f6ed 0%, #e2f7ce 100%);
            font-family: 'Courier New', monospace;
        }

        .intro {
            display: flex;
            justify-content: space-around;
        }

        .intro p {
            width: 60%;
        }

        .card {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .card h2 {
            font-size: 26px;
            color: #ff6f61;
        }

        .card p {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            margin: 0 0 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            text-decoration: none;
        }

        .social-links img {
            width: 35px;
            height: 35px;
        }

        /* Media queries for small mobile screens */
        @media (max-width: 425px) {
            .card {
                padding: 16px;
                max-width: 80%;
            }

            .card h2 {
                font-size: 20px;
            }

            .card p {
                font-size: 14px;
            }

            .social-links img {
                width: 30px;
                height: 30px;
            }

            .intro {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 12px;
            }

            .intro img {
                width: 80px;
                height: 80px;
            }

            .intro p {
                width: 100%;
            }
        }

        /* Media queries for tablets */
        @media (min-width: 426px) and (max-width: 767px) {
            .card {
                padding: 20px;
                max-width: 400px;
            }

            .card h2 {
                font-size: 22px;
            }

            .card p {
                font-size: 16px;
            }

            .social-links img {
                width: 35px;
                height: 35px;
            }

            .intro img {
                width: 80px;
                height: 80px;
            }

            .intro p {
                width: 70%;
            }
        }

        /* Media queries for desktop screens */
        @media (min-width: 768px) and (max-width: 1999px) {
            .card {
                max-width: 400px;
            }

            .card h2 {
                font-size: 26px;
            }

            .card p {
                font-size: 18px;
            }

            .social-links img {
                width: 40px;
                height: 40px;
            }

            .intro img {
                width: 100px;
                height: 100px;
            }
        }

        /* Media query for extra large screens */
        @media (min-width: 2000px) {
            .card {
                max-width: 580px;
                padding: 28px;
            }

            .intro p {
                width: 70%;
            }

            .card h2 {
                font-size: 32px;
            }

            .card p {
                font-size: 22px;
            }

            .social-links img {
                width: 50px;
                height: 50px;
            }

            .intro img {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>👋🤓 Hey there!!🎉</h2>
        <span class="intro">
            <p>I'm Shomi Khan, your friendly neighborhood programmer 🤘 from Bangladesh 🇧🇩.</p>
            <img src="programmer.png" height="100" width="100" alt="Shomi Khan">
        </span>
        <p>When I'm not coding, you can find me munching on snacks 🍫🍟, binging on anime ⛩️ or exploring games 🎮.
            Always up for a chat or to dive into cool new stuff. So don't be shy—hit me up anytime!! 😊😊😊</p>

        <div class="social-links">
            <a href="https://github.com/nahK994" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
            </a>
            <a href="https://linkedin.com/in/shomi-khan-64b418118" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
            </a>
            <a href="https://www.facebook.com/shomi.khan1/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174848.png" alt="Facebook">
            </a>
        </div>
    </div>
</body>

</html>
